<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FyisBot | Acceso</title>
    <link rel="icon" href="{{ url_for('static', filename='plant.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Estilos minimalistas para login */
        .login-logo {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(70, 211, 105, 0.4);
        }
        
        .login-title {
            color: #46d369;
            margin: 0 0 10px 0;
            font-size: 2rem;
            font-weight: 700;
        }
        
        .login-subtitle {
            color: #aaa;
            margin: 0 0 30px 0;
            font-size: 0.95rem;
        }
        
        .error-box {
            background: rgba(229, 9, 20, 0.15);
            border: 1px solid rgba(229, 9, 20, 0.5);
            padding: 12px;
            border-radius: 8px;
            margin: 0 0 20px 0;
            color: #ff6666;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="fyis-card">
        <div class="login-logo">🎬</div>
        <h1 class="login-title">FyisBot</h1>
        <p class="login-subtitle">Ingresa tu Token de Acceso</p>
        
        {% if error %}
        <div class="error-box">
            <span>⚠️</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="token" class="fyis-input" placeholder="Token de acceso..." required autofocus autocomplete="off">
            <button type="submit" class="fyis-btn">INGRESAR</button>
        </form>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); color: #666; font-size: 0.85rem;">
            <p style="margin: 0;">🔐 Token Admin: <code style="color: #888;">152028</code></p>
        </div>
    </div>
</body>
</html>
